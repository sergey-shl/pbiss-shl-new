<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shliakhtin Family · School Reports 2025–26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e12;
  --surface: #17171d;
  --surface2: #1f1f27;
  --border: #2a2a33;
  --text: #e8e8ec;
  --muted: #8b8b96;
  --ff-head: 'Unbounded', system-ui, sans-serif;
  --ff-body: 'Manrope', system-ui, sans-serif;
  --sofiia-h: #a78bfa;
  --mark-h: #34d399;
  --maiia-h: #fb923c;
  --gold: #fbbf24;
  --good: #4ade80;
  --blue: #60a5fa;
  --warn: #f87171;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ff-body);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
button { font-family: var(--ff-body); }
:focus-visible { outline: 2px solid var(--active-h, var(--blue)); outline-offset: 2px; border-radius: 4px; }

/* ── LANGUAGE SWITCHER ── */
.lang-switch {
  position: fixed;
  top: .9rem;
  right: 1rem;
  z-index: 500;
  display: flex;
  align-items: center;
  gap: .45rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: .4rem .95rem;
  font-size: .8rem;
  font-weight: 600;
  transition: border-color .2s, transform .2s;
}
.lang-switch:hover { border-color: var(--muted); transform: translateY(-1px); }
.lang-switch .flag { font-size: 1rem; line-height: 1; }

/* ── LANDING ── */
#landing { max-width: 1080px; margin: 0 auto; padding: 5rem 2rem 4rem; }
#landing.hidden { display: none; }
.landing-eyebrow {
  font-size: .75rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.2rem;
}
.landing-title {
  font-family: var(--ff-head);
  font-size: clamp(2rem, 6vw, 3.6rem);
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: .9rem;
}
.landing-title .grad {
  background: linear-gradient(90deg, #a78bfa, #34d399 50%, #fb923c);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.landing-sub { color: var(--muted); font-size: 1rem; margin-bottom: 3rem; }
.child-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.25rem; }
.child-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem 1.6rem;
  text-align: center;
  cursor: pointer;
  transition: transform .25s, border-color .25s, box-shadow .25s;
}
.child-card:hover { transform: translateY(-4px); }
[data-child="sofiia"].child-card:hover { border-color: var(--sofiia-h); box-shadow: 0 12px 40px -18px var(--sofiia-h); }
[data-child="mark"].child-card:hover   { border-color: var(--mark-h);   box-shadow: 0 12px 40px -18px var(--mark-h); }
[data-child="maiia"].child-card:hover  { border-color: var(--maiia-h);  box-shadow: 0 12px 40px -18px var(--maiia-h); }
.child-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  margin: 0 auto 1.1rem;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-head); font-size: 1.4rem; font-weight: 800;
}
[data-child="sofiia"] .child-avatar { background: linear-gradient(135deg,#7c3aed,#a78bfa); color:#fff; }
[data-child="mark"] .child-avatar   { background: linear-gradient(135deg,#059669,#34d399); color:#fff; }
[data-child="maiia"] .child-avatar  { background: linear-gradient(135deg,#ea580c,#fb923c); color:#fff; }
.child-name { font-family: var(--ff-head); font-size: 1.25rem; font-weight: 700; margin-bottom: .25rem; }
[data-child="sofiia"] .child-name { color: var(--sofiia-h); }
[data-child="mark"] .child-name   { color: var(--mark-h); }
[data-child="maiia"] .child-name  { color: var(--maiia-h); }
.child-year { font-size: .8rem; color: var(--muted); margin-bottom: 1.25rem; }
.child-cta {
  display: inline-block;
  font-size: .75rem; font-weight: 500;
  letter-spacing: .08em; text-transform: uppercase;
  padding: .45rem 1rem; border-radius: 999px;
  border: 1px solid currentColor;
  transition: background .2s, color .2s;
}
[data-child="sofiia"] .child-cta { color: var(--sofiia-h); }
[data-child="mark"] .child-cta   { color: var(--mark-h); }
[data-child="maiia"] .child-cta  { color: var(--maiia-h); }
[data-child="sofiia"]:hover .child-cta { background: var(--sofiia-h); color: #fff; }
[data-child="mark"]:hover .child-cta   { background: var(--mark-h);   color: #fff; }
[data-child="maiia"]:hover .child-cta  { background: var(--maiia-h);  color: #fff; }

/* ── REPORT PAGE ── */
#report { display: none; }
#report.visible { display: block; }
.report-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(14,14,18,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: .75rem 2rem;
  display: flex; align-items: center; gap: 1rem;
}
.nav-back {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: .85rem; display: flex; align-items: center; gap: .4rem;
  transition: color .2s;
}
.nav-back:hover { color: var(--text); }
.nav-name { font-family: var(--ff-head); font-size: 1rem; font-weight: 700; color: var(--active-h); }
.nav-tabs { margin-left: auto; display: flex; gap: .25rem; overflow-x: auto; scrollbar-width: none; }
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: .8rem; padding: .4rem .8rem; border-radius: 8px;
  white-space: nowrap;
  transition: background .2s, color .2s;
}
.nav-tab:hover { background: var(--surface2); color: var(--text); }
.nav-tab.active { background: var(--surface2); color: var(--active-h); }

/* HERO */
.hero {
  padding: 4rem 2rem 3rem;
  max-width: 960px; margin: 0 auto;
  display: grid; grid-template-columns: auto 1fr; gap: 2.5rem; align-items: center;
}
.hero-avatar {
  width: 110px; height: 110px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-head); font-size: 2.5rem; font-weight: 800;
  color: #fff; flex-shrink: 0; position: relative;
}
.hero-avatar::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 2px solid var(--active-h); opacity: .5;
}
.hero-sub { font-size: .85rem; color: var(--muted); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .1em; }
.hero-name { font-family: var(--ff-head); font-size: clamp(2rem,5vw,3.2rem); font-weight: 800; line-height: 1; margin-bottom: .75rem; color: var(--active-h); }
.hero-quote { font-size: .95rem; color: var(--muted); font-style: italic; max-width: 480px; }
.hero-quote .who { display: block; font-style: normal; font-size: .78rem; margin-top: .35rem; }

/* SECTIONS */
.section { max-width: 960px; margin: 0 auto; padding: 2.5rem 2rem; }
.section-title {
  font-family: var(--ff-head); font-size: 1.15rem; font-weight: 700;
  margin-bottom: 1.6rem; color: var(--text);
}
.section-title .num { color: var(--active-h); }
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 1.6rem;
}

/* JOURNEY */
.chart-wrap { width: 100%; overflow: hidden; }
.chart-wrap svg { width: 100%; height: auto; display: block; }
.legend { display: flex; flex-wrap: wrap; gap: .9rem 1.4rem; margin-top: 1rem; }
.legend-item { display: flex; align-items: center; gap: .45rem; font-size: .8rem; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.journey-chips { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1rem; margin-top: 1.25rem; }
.jchip {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 14px;
  padding: 1rem 1.1rem;
}
.jchip .big { font-family: var(--ff-head); font-size: 1.05rem; font-weight: 700; color: var(--active-h); margin-bottom: .2rem; }
.jchip .small { font-size: .78rem; color: var(--muted); }
.att-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.25rem; }
.att-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.1rem; }
.att-title { font-size: .78rem; color: var(--muted); margin-bottom: .6rem; }
.att-bars { display: flex; align-items: flex-end; gap: .6rem; height: 58px; }
.att-bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .3rem; justify-content: flex-end; height: 100%; }
.att-bar .bar { width: 100%; border-radius: 6px 6px 2px 2px; background: var(--active-h); opacity: .8; min-height: 3px; }
.att-bar .n { font-size: .72rem; color: var(--text); font-weight: 700; }
.att-bar .t { font-size: .66rem; color: var(--muted); }
.att-note { font-size: .74rem; color: var(--muted); margin-top: .55rem; }

/* SUBJECTS */
.subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.1rem; }
.subject-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 1.25rem; display: flex; flex-direction: column; gap: .7rem;
}
.subj-head { display: flex; align-items: center; gap: .7rem; }
.subj-icon { font-size: 1.4rem; }
.subj-name { font-weight: 700; font-size: .95rem; flex: 1; }
.subj-teacher { font-size: .72rem; color: var(--muted); }
.subj-flag {
  align-self: flex-start;
  font-size: .68rem; font-weight: 700;
  padding: .2rem .6rem; border-radius: 999px;
  background: var(--surface2); border: 1px solid var(--border);
}
.subj-flag.up { color: var(--good); border-color: rgba(74,222,128,.4); }
.subj-flag.star { color: var(--gold); border-color: rgba(251,191,36,.4); }
.subj-flag.watch { color: var(--warn); border-color: rgba(248,113,113,.4); }
.subj-flag.steady { color: var(--blue); border-color: rgba(96,165,250,.4); }
.subj-trend { display: flex; align-items: center; gap: .8rem; }
.grade-chips { display: flex; align-items: center; gap: .35rem; font-family: var(--ff-head); font-size: .92rem; font-weight: 700; }
.grade-chips .arrow { color: var(--muted); font-family: var(--ff-body); font-weight: 400; font-size: .8rem; }
.grade-chips .g:last-child { color: var(--active-h); }
.spark { flex-shrink: 0; }
.badge-row { display: flex; flex-wrap: wrap; gap: .4rem; }
.badge {
  font-size: .66rem; font-weight: 600;
  padding: .18rem .55rem; border-radius: 999px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
}
.badge.b-exc { color: var(--gold); border-color: rgba(251,191,36,.35); }
.badge.b-vg  { color: var(--good); border-color: rgba(74,222,128,.35); }
.badge.b-good{ color: var(--blue); border-color: rgba(96,165,250,.35); }
.badge.b-sat { color: var(--muted); }
.badge.b-na  { color: var(--warn); border-color: rgba(248,113,113,.35); }
.subj-quote { font-size: .78rem; color: var(--muted); font-style: italic; border-left: 2px solid var(--border); padding-left: .7rem; }

/* RADAR */
.radar-flex { display: grid; grid-template-columns: 1fr; gap: 1rem; justify-items: center; }
.radar-flex svg { max-width: 460px; width: 100%; height: auto; }
.radar-legend { display: flex; gap: 1.6rem; font-size: .8rem; color: var(--muted); }

/* ENGLISH QUEST */
.quest-path { display: flex; flex-wrap: wrap; align-items: stretch; gap: .6rem; margin: 1.2rem 0; }
.quest-step {
  flex: 1; min-width: 120px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 14px;
  padding: .9rem .8rem; text-align: center; position: relative;
}
.quest-step.done { border-color: var(--active-h); }
.quest-step.star { border-color: var(--gold); background: linear-gradient(135deg, var(--surface2), rgba(251,191,36,.08)); }
.quest-step .icon { font-size: 1.3rem; margin-bottom: .3rem; }
.quest-step .lab { font-weight: 700; font-size: .85rem; }
.quest-step .sub { font-size: .68rem; color: var(--muted); margin-top: .15rem; }
.quest-note { font-size: .85rem; color: var(--muted); }
.quest-quote { margin-top: 1rem; font-size: .82rem; font-style: italic; color: var(--muted); border-left: 2px solid var(--active-h); padding-left: .8rem; }
.quest-quote .who { display: block; font-style: normal; font-size: .72rem; margin-top: .3rem; }

/* POWERS & QUESTS */
.pq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
.pq-col h3 { font-family: var(--ff-head); font-size: .95rem; margin-bottom: 1rem; }
.pq-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 1rem 1.1rem; margin-bottom: .8rem;
  display: flex; gap: .8rem; align-items: flex-start;
}
.pq-item .icon { font-size: 1.3rem; line-height: 1.3; }
.pq-item .title { font-weight: 700; font-size: .88rem; margin-bottom: .15rem; }
.pq-item .desc { font-size: .78rem; color: var(--muted); }

/* FUN STATS */
.fun-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1.1rem; }
.fun-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 1.4rem 1.2rem; text-align: center;
  transition: transform .25s, border-color .25s;
}
.fun-card:hover { transform: translateY(-3px); border-color: var(--active-h); }
.fun-big { font-family: var(--ff-head); font-size: 1.5rem; font-weight: 800; color: var(--active-h); margin-bottom: .4rem; }
.fun-label { font-size: .78rem; color: var(--muted); }

/* YEAR IN REVIEW */
.yir-arc { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 1.1rem; margin-bottom: 1.25rem; }
.yir-phase {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 1.3rem 1.2rem; position: relative;
}
.yir-tag {
  display: inline-block; font-size: .64rem; font-weight: 800; letter-spacing: .14em;
  text-transform: uppercase; color: var(--active-h); margin-bottom: .6rem;
}
.yir-title { font-family: var(--ff-head); font-size: .95rem; font-weight: 700; margin-bottom: .5rem; }
.yir-text { font-size: .8rem; color: var(--muted); }
.yir-forward {
  border-radius: 18px; padding: 1.6rem;
  border: 1px solid var(--active-h);
  background: linear-gradient(135deg, var(--surface), var(--surface2));
}
.yir-forward .title { font-family: var(--ff-head); font-size: 1.05rem; font-weight: 800; margin-bottom: .6rem; }
.yir-forward .text { font-size: .86rem; color: var(--muted); max-width: 640px; }

.footer { text-align: center; padding: 3rem 2rem 4rem; color: var(--muted); font-size: .75rem; }

@media (max-width: 640px) {
  .hero { grid-template-columns: 1fr; text-align: center; gap: 1.4rem; }
  .hero-avatar { margin: 0 auto; }
  .hero-quote { margin: 0 auto; }
  .pq-grid { grid-template-columns: 1fr; }
  .att-grid { grid-template-columns: 1fr; }
  .report-nav { padding: .75rem 1rem; flex-wrap: wrap; }
  .nav-tabs { width: 100%; margin-left: 0; }
  #landing { padding: 4rem 1.25rem 3rem; }
  .section { padding: 2rem 1.25rem; }
}
</style>
</head>

<script>
/* ═══════════════ HELPERS ═══════════════ */
const LETTER_MAP = {'A*':8,'A':7,'B':6,'C':5,'D':4,'E':3,'F':2,'G':1,'U':0};
const LETTER_TICKS = [[8,'A*'],[7,'A'],[6,'B'],[5,'C'],[4,'D'],[3,'E']];
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const toNum = v => typeof v === 'number' ? v : LETTER_MAP[v];

function effortClass(word){
  const w = STR.effortClassMap[word] || '';
  return w;
}

/* Multi-line trend chart (SVG) */
function lineChart(lines, opts){
  const W = 640, H = 300, padL = 46, padR = 18, padT = 18, padB = 34;
  const min = opts.min, max = opts.max;
  const iw = W - padL - padR, ih = H - padT - padB;
  const x = i => padL + iw * (i / 2);
  const y = v => padT + ih * (1 - (v - min) / (max - min));
  let g = '';
  const ticks = opts.letterTicks ? LETTER_TICKS.filter(t=>t[0]>=min&&t[0]<=max) : null;
  const gridVals = ticks ? ticks.map(t=>t[0]) : (()=>{const a=[];for(let v=min;v<=max;v++)a.push(v);return a;})();
  gridVals.forEach(v=>{
    g += `<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="#2a2a33" stroke-width="1"/>`;
    const lab = ticks ? ticks.find(t=>t[0]===v)[1] : v;
    g += `<text x="${padL-10}" y="${y(v)+4}" text-anchor="end" font-size="11" fill="#8b8b96" font-family="Manrope">${lab}</text>`;
  });
  STR.terms.forEach((t,i)=>{
    g += `<text x="${x(i)}" y="${H-10}" text-anchor="middle" font-size="12" fill="#8b8b96" font-family="Manrope" font-weight="600">${t}</text>`;
  });
  lines.forEach(l=>{
    const pts = l.values.map((v,i)=>[x(i), y(toNum(v))]);
    const d = pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    g += `<path d="${d}" fill="none" stroke="${l.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    pts.forEach((p,i)=>{
      g += `<circle cx="${p[0]}" cy="${p[1]}" r="4.5" fill="#0e0e12" stroke="${l.color}" stroke-width="2.5"/>`;
      if(i===2){
        const lab = typeof l.values[2]==='number' ? l.values[2] : l.values[2];
        g += `<text x="${p[0]+2}" y="${p[1]-9}" text-anchor="end" font-size="11" font-weight="700" fill="${l.color}" font-family="Manrope">${lab}</text>`;
      }
    });
  });
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(opts.aria||'')}">${g}</svg>`;
}

/* Tiny 3-point sparkline */
function spark(values, min, max, color){
  const W=64, H=26, p=4;
  const x = i => p + (W-2*p)*(i/2);
  const y = v => p + (H-2*p)*(1-(toNum(v)-min)/(max-min));
  const pts = values.map((v,i)=>[x(i),y(v)]);
  const d = pts.map((pt,i)=>(i?'L':'M')+pt[0].toFixed(1)+' '+pt[1].toFixed(1)).join(' ');
  let g = `<path d="${d}" fill="none" stroke="${color}" stroke-width="2"/>`;
  pts.forEach((pt,i)=>{ g += `<circle cx="${pt[0]}" cy="${pt[1]}" r="${i===2?3:2.2}" fill="${color}"/>`; });
  return `<svg class="spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" aria-hidden="true">${g}</svg>`;
}

/* Radar chart: two series */
function radar(cfg, accent){
  const W=460, H=400, cx=W/2, cy=H/2+6, R=140;
  const n = cfg.axes.length;
  const ang = i => -Math.PI/2 + i*2*Math.PI/n;
  const pt = (i, r) => [cx + r*Math.cos(ang(i)), cy + r*Math.sin(ang(i))];
  let g = '';
  [0.25,0.5,0.75,1].forEach(f=>{
    const ring = cfg.axes.map((_,i)=>pt(i,R*f).map(v=>v.toFixed(1)).join(',')).join(' ');
    g += `<polygon points="${ring}" fill="none" stroke="#2a2a33" stroke-width="1"/>`;
  });
  cfg.axes.forEach((a,i)=>{
    const [x2,y2]=pt(i,R);
    g += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#2a2a33" stroke-width="1"/>`;
    const [lx,ly]=pt(i,R+26);
    g += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#e8e8ec" font-family="Manrope" font-weight="600">${esc(a)}</text>`;
  });
  const poly = (vals, color, fillOp) => {
    const pts = vals.map((v,i)=>pt(i, R*Math.max(0.02, toNum(v)/cfg.max)).map(x=>x.toFixed(1)).join(',')).join(' ');
    return `<polygon points="${pts}" fill="${color}" fill-opacity="${fillOp}" stroke="${color}" stroke-width="2"/>`;
  };
  g += poly(cfg.t1, '#8b8b96', 0.12);
  g += poly(cfg.t3, accent, 0.22);
  return `<svg viewBox="0 0 ${W} ${H}" role="img">${g}</svg>`;
}

/* ═══════════════ RENDER ═══════════════ */
const ACCENT = { sofiia: '#a78bfa', mark: '#34d399', maiia: '#fb923c' };

function renderLanding(){
  const cards = Object.entries(DATA).map(([id,c])=>`
    <div class="child-card" data-child="${id}" role="button" tabindex="0" aria-label="${esc(c.name)}">
      <div class="child-avatar">${c.initials}</div>
      <div class="child-name">${esc(c.name)}</div>
      <div class="child-year">${esc(c.year)}</div>
      <span class="child-cta">${STR.viewReport}</span>
    </div>`).join('');
  document.getElementById('landing').innerHTML = `
    <div class="landing-eyebrow">${STR.eyebrow}</div>
    <h1 class="landing-title">${STR.h1}</h1>
    <p class="landing-sub">${STR.tagline}</p>
    <div class="child-grid">${cards}</div>`;
  document.querySelectorAll('.child-card').forEach(el=>{
    const open = ()=>openReport(el.dataset.child);
    el.addEventListener('click', open);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();open();} });
  });
}

function badgeHTML(kind, word){
  return `<span class="badge ${effortClass(word)}">${kind}: ${esc(word)}</span>`;
}

function sectionJourney(c){
  const chart = lineChart(c.journey.lines, c.journey.opts);
  const legend = c.journey.lines.map(l=>`<span class="legend-item"><span class="legend-dot" style="background:${l.color}"></span>${esc(l.label)}</span>`).join('');
  const chips = c.journey.chips.map(ch=>`<div class="jchip"><div class="big">${esc(ch.big)}</div><div class="small">${esc(ch.small)}</div></div>`).join('');
  const attCard = (title, vals, note)=>{
    const mx = Math.max(...vals, 1);
    const bars = vals.map((v,i)=>`<div class="att-bar"><span class="n">${v}</span><div class="bar" style="height:${Math.max(6, v/mx*100)}%"></div><span class="t">${STR.terms[i]}</span></div>`).join('');
    return `<div class="att-card"><div class="att-title">${esc(title)}</div><div class="att-bars">${bars}</div><div class="att-note">${esc(note)}</div></div>`;
  };
  return `<section class="section" id="sec-journey">
    <h2 class="section-title"><span class="num">01</span> · ${STR.sec.journey}</h2>
    <div class="panel">
      <div class="chart-wrap">${chart}</div>
      <div class="legend">${legend}</div>
      <div class="journey-chips">${chips}</div>
      <div class="att-grid">
        ${attCard(STR.att.absent, c.attendance.absent, c.attendance.absentNote)}
        ${attCard(STR.att.late, c.attendance.late, c.attendance.lateNote)}
      </div>
    </div>
  </section>`;
}

function sectionSubjects(c){
  const cards = c.subjects.map(s=>{
    const flag = s.flag ? `<span class="subj-flag ${s.flag.type}">${esc(s.flag.label)}</span>` : '';
    const chips = s.vals.map((v,i)=>`<span class="g">${esc(v)}</span>${i<2?'<span class="arrow">→</span>':''}`).join('');
    const sp = spark(s.vals, c.scale.min, c.scale.max, ACCENT[c.id]);
    const badges = [
      badgeHTML(STR.chips.effort, s.effort),
      badgeHTML(STR.chips.atl, s.atl),
      s.exam ? `<span class="badge">${STR.chips.exam}: ${esc(s.exam)}</span>` : '',
      s.pred ? `<span class="badge">${STR.chips.pred}: ${esc(s.pred)}</span>` : ''
    ].join('');
    return `<div class="subject-card">
      <div class="subj-head"><span class="subj-icon">${s.icon}</span>
        <div style="flex:1"><div class="subj-name">${esc(s.name)}</div><div class="subj-teacher">${esc(s.teacher)}</div></div>
      </div>
      ${flag}
      <div class="subj-trend"><div class="grade-chips">${chips}</div>${sp}</div>
      <div class="badge-row">${badges}</div>
      ${s.quote ? `<div class="subj-quote">«${esc(s.quote)}»</div>` : ''}
    </div>`;
  }).join('');
  return `<section class="section" id="sec-subjects">
    <h2 class="section-title"><span class="num">02</span> · ${STR.sec.subjects}</h2>
    <div class="subject-grid">${cards}</div>
  </section>`;
}

function sectionRadar(c){
  return `<section class="section" id="sec-radar">
    <h2 class="section-title"><span class="num">03</span> · ${STR.sec.radar}</h2>
    <div class="panel radar-flex">
      ${radar(c.radar, ACCENT[c.id])}
      <div class="radar-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#8b8b96"></span>${STR.terms[0]}</span>
        <span class="legend-item"><span class="legend-dot" style="background:${ACCENT[c.id]}"></span>${STR.terms[2]}</span>
      </div>
    </div>
  </section>`;
}

function sectionEnglish(c){
  const e = c.english;
  const steps = e.path.map(p=>`<div class="quest-step ${p.state||''}">
      <div class="icon">${p.icon}</div>
      <div class="lab">${esc(p.label)}</div>
      <div class="sub">${esc(p.sub||'')}</div>
    </div>`).join('');
  return `<section class="section" id="sec-english">
    <h2 class="section-title"><span class="num">04</span> · ${STR.sec.english}</h2>
    <div class="panel">
      <p class="quest-note">${esc(e.intro)}</p>
      <div class="quest-path">${steps}</div>
      <p class="quest-note">${esc(e.note)}</p>
      ${e.quote ? `<div class="quest-quote">«${esc(e.quote.text)}»<span class="who">— ${esc(e.quote.who)}</span></div>` : ''}
    </div>
  </section>`;
}

function sectionPowers(c){
  const item = p=>`<div class="pq-item"><span class="icon">${p.icon}</span><div><div class="title">${esc(p.title)}</div><div class="desc">${esc(p.desc)}</div></div></div>`;
  return `<section class="section" id="sec-powers">
    <h2 class="section-title"><span class="num">05</span> · ${STR.sec.powers}</h2>
    <div class="pq-grid">
      <div class="pq-col"><h3>${STR.powersTitle}</h3>${c.powers.map(item).join('')}</div>
      <div class="pq-col"><h3>${STR.questsTitle}</h3>${c.quests.map(item).join('')}</div>
    </div>
  </section>`;
}

function sectionFun(c){
  const cards = c.fun.map(f=>`<div class="fun-card"><div class="fun-big">${esc(f.big)}</div><div class="fun-label">${esc(f.label)}</div></div>`).join('');
  return `<section class="section" id="sec-fun">
    <h2 class="section-title"><span class="num">06</span> · ${STR.sec.fun}</h2>
    <div class="fun-grid">${cards}</div>
  </section>`;
}

function sectionYear(c){
  const phases = c.yir.phases.map(p=>`<div class="yir-phase">
      <span class="yir-tag">${esc(p.tag)}</span>
      <div class="yir-title">${esc(p.title)}</div>
      <div class="yir-text">${esc(p.text)}</div>
    </div>`).join('');
  return `<section class="section" id="sec-year">
    <h2 class="section-title"><span class="num">07</span> · ${STR.sec.year}</h2>
    <div class="yir-arc">${phases}</div>
    <div class="yir-forward">
      <div class="title">${esc(c.yir.forward.title)}</div>
      <div class="text">${esc(c.yir.forward.text)}</div>
    </div>
  </section>`;
}

function openReport(id){
  const c = DATA[id]; c.id = id;
  document.documentElement.style.setProperty('--active-h', ACCENT[id]);
  document.getElementById('landing').classList.add('hidden');
  const rep = document.getElementById('report');
  rep.classList.add('visible');
  document.getElementById('navName').textContent = c.name;
  document.getElementById('navBackLabel').textContent = STR.back;
  const tabs = STR.tabs.map(t=>`<button class="nav-tab" data-target="sec-${t.id}">${t.label}</button>`).join('');
  document.getElementById('navTabs').innerHTML = tabs;
  const grad = {sofiia:'linear-gradient(135deg,#7c3aed,#a78bfa)',mark:'linear-gradient(135deg,#059669,#34d399)',maiia:'linear-gradient(135deg,#ea580c,#fb923c)'}[id];
  document.getElementById('reportContent').innerHTML = `
    <header class="hero">
      <div class="hero-avatar" style="background:${grad}">${c.initials}</div>
      <div>
        <div class="hero-sub">${esc(c.year)} · ${STR.fullYear}</div>
        <h1 class="hero-name">${esc(c.name)}</h1>
        <p class="hero-quote">«${esc(c.quote.text)}»<span class="who">— ${esc(c.quote.who)}</span></p>
      </div>
    </header>
    ${sectionJourney(c)}
    ${sectionSubjects(c)}
    ${sectionRadar(c)}
    ${sectionEnglish(c)}
    ${sectionPowers(c)}
    ${sectionFun(c)}
    ${sectionYear(c)}
    <div class="footer">${STR.footer}</div>`;
  document.querySelectorAll('.nav-tab').forEach(b=>{
    b.addEventListener('click', ()=>{
      document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      const el = document.getElementById(b.dataset.target);
      if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    });
  });
  window.scrollTo({top:0});
}

document.getElementById('navBack').addEventListener('click', ()=>{
  document.getElementById('report').classList.remove('visible');
  document.getElementById('landing').classList.remove('hidden');
  window.scrollTo({top:0});
});

renderLanding();
</script>
</body>
</html>
